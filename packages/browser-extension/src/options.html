<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SmartLangGuard Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      color: #0f172a;
      background: #f8fafc;
    }
    h1 { font-size: 24px; margin-bottom: 24px; }
    h2 { font-size: 16px; margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #e2e8f0; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .field input { 
      width: 100%; 
      padding: 8px 10px; 
      border: 1px solid #cbd5e1; 
      border-radius: 6px; 
      font-family: monospace; 
      font-size: 13px; 
    }
    .field .hint { font-size: 11px; color: #64748b; margin-top: 4px; }
    .btn-row { margin-top: 20px; display: flex; gap: 8px; }
    button { 
      padding: 8px 16px; 
      border: none; 
      border-radius: 6px; 
      font-size: 13px; 
      cursor: pointer; 
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-secondary { background: #e2e8f0; color: #475569; }
    .status-msg { 
      margin-top: 12px; 
      padding: 8px 12px; 
      border-radius: 6px; 
      font-size: 13px; 
      display: none; 
    }
    .status-msg.success { background: #ecfdf5; color: #065f46; display: block; }
    .status-msg.error { background: #fef2f2; color: #991b1b; display: block; }
  </style>
</head>
<body>
  <h1>SmartLangGuard Settings</h1>
  
  <h2>Daemon Connection</h2>
  <div class="field">
    <label>Daemon endpoint (local)</label>
    <input id="daemonEndpoint" type="text" placeholder="http://localhost:41783">
    <div class="hint">The local daemon must be running. Start it with: <code>smartlangguard daemon</code></div>
  </div>
  
  <h2>SaaS Backend</h2>
  <div class="field">
    <label>API endpoint</label>
    <input id="apiEndpoint" type="text" placeholder="http://localhost:4000">
  </div>
  
  <h2>License</h2>
  <div class="field">
    <label>License token (optional)</label>
    <input id="licenseToken" type="text" placeholder="slg_xxxxxxxxxxxxxxxxxxxxxxxx">
    <div class="hint">Get a token at <a href="https://smartlangguard.com/pricing" target="_blank">smartlangguard.com/pricing</a></div>
  </div>
  
  <h2>Privacy</h2>
  <div class="field">
    <label>
      <input type="checkbox" id="telemetry"> Send anonymous usage telemetry
    </label>
    <div class="hint">Helps improve SmartLangGuard. No personal data is collected.</div>
  </div>
  
  <div class="btn-row">
    <button class="btn-primary" id="save">Save Settings</button>
    <button class="btn-secondary" id="activate">Activate License</button>
  </div>
  
  <div class="status-msg" id="status"></div>
  
  <script src="options.js"></script>
</body>
</html>
