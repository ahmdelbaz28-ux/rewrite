name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  wait-for-builds:
    name: Wait for Build Workflow
    runs-on: ubuntu-latest
    steps:
      - name: Wait for build workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.ref }}
          check-name: 'Build win-x64'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: wait-for-builds
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: |
          find artifacts -type f | sort
          echo "---"
          ls -lhR artifacts/
      
      - name: Prepare release directory
        run: |
          mkdir -p release
          # Move binaries to release/
          find artifacts/binary-* -name 'smartlangguard-*' -exec cp {} release/ \;
          # Move checksums
          find artifacts/binary-* -name 'checksums.sha256' -exec cat {} \; > release/checksums.sha256
          # Move dashboard
          cp -r artifacts/admin-dashboard release/admin-dashboard
          # Move extension
          find artifacts/browser-extension -name '*.zip' -exec cp {} release/ \;
          
          ls -lh release/
      
      - name: Generate latest.json manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > release/latest.json << EOF
          {
            "version": "$VERSION",
            "release_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "files": [
              {
                "file": "smartlangguard-win-x64.exe",
                "platform": "windows-x64",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/smartlangguard-win-x64.exe"
              },
              {
                "file": "smartlangguard-macos-x64",
                "platform": "macos-x64",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/smartlangguard-macos-x64"
              },
              {
                "file": "smartlangguard-macos-arm64",
                "platform": "macos-arm64",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/smartlangguard-macos-arm64"
              },
              {
                "file": "smartlangguard-linux-x64",
                "platform": "linux-x64",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/smartlangguard-linux-x64"
              },
              {
                "file": "smartlangguard-linux-arm64",
                "platform": "linux-arm64",
                "url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/smartlangguard-linux-arm64"
              }
            ]
          }
          EOF
          cat release/latest.json
      
      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > release-notes.md << EOF
          # SmartLangGuard v${VERSION}
          
          ## Downloads
          
          | Platform | File |
          |----------|------|
          | Windows x64 | \`smartlangguard-win-x64.exe\` |
          | macOS Intel | \`smartlangguard-macos-x64\` |
          | macOS Apple Silicon | \`smartlangguard-macos-arm64\` |
          | Linux x64 | \`smartlangguard-linux-x64\` |
          | Linux arm64 | \`smartlangguard-linux-arm64\` |
          
          ## Installation
          
          \`\`\`bash
          # Verify checksum
          sha256sum -c checksums.sha256
          
          # Make executable (Unix)
          chmod +x smartlangguard-*
          
          # Move to PATH
          sudo mv smartlangguard-* /usr/local/bin/smartlangguard
          
          # Verify
          smartlangguard --version
          \`\`\`
          
          ## What's New
          
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.
          
          ## Checksums
          
          See \`checksums.sha256\` file.
          EOF
          
          echo "path=release-notes.md" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SmartLangGuard v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: |
            release/smartlangguard-*
            release/checksums.sha256
            release/latest.json
            release/smartlangguard-extension-*.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: false
