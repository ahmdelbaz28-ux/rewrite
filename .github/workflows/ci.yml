name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-all:
    name: Test All Packages (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root
      - name: Run all tests
        run: node node_modules/.bin/jest --config jest.config.json --ci --maxWorkers=2
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret
          ADMIN_DEFAULT_PASSWORD: citestpass123
          SMARTLANGGUARD_DB_PATH: ':memory:'

  # ─── Per-package smoke jobs (kept for granular failure attribution) ─────────
  test-core:
    name: Test Core Package
    runs-on: ubuntu-latest
    needs: test-all
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root
      - name: Test Core
        run: npm test --workspace @smartlangguard/core
        env:
          NODE_ENV: test

  test-backend:
    name: Test Backend Package
    runs-on: ubuntu-latest
    needs: test-all
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root
      - name: Test Backend
        run: npm test --workspace @smartlangguard/backend
        env:
          JWT_SECRET: ci-test-jwt-secret
          ADMIN_DEFAULT_PASSWORD: citestpass123
          SMARTLANGGUARD_DB_PATH: ':memory:'
          NODE_ENV: test

  test-mcp:
    name: Test MCP Server
    runs-on: ubuntu-latest
    needs: test-all
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root
      - name: Test MCP
        run: npm test --workspace @smartlangguard/mcp-server
        env:
          NODE_ENV: test

  test-daemon:
    name: Test Daemon Package
    runs-on: ubuntu-latest
    needs: test-all
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root
      - name: Test Daemon (cross-platform tests)
        run: node node_modules/.bin/jest packages/daemon/tests/ --ci --reporters=default
        env:
          NODE_ENV: test

  # ─── VS Code extension compilation ──────────────────────────────────────────
  compile-vscode:
    name: Compile VS Code Extension
    runs-on: ubuntu-latest
    needs: test-all
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root
      - name: Compile (tsc --noEmit)
        run: npm run lint --workspace smartlangguard

  # ─── CLI binary build on all 3 platforms ────────────────────────────────────
  build-cli:
    name: Build CLI Binaries
    runs-on: ${{ matrix.os }}
    needs: [test-core, test-backend, test-mcp]
    if: always()
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --workspaces --include-workspace-root
      - name: Build CLI
        run: npm run build:cli
