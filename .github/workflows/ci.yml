name: CI - Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-core:
    name: Test Core (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        working-directory: .
      
      - name: Run translator tests
        run: npx jest packages/core/tests/translator.test.js --ci --coverage
        working-directory: .
      
      - name: Run custom AI model tests
        run: npx jest packages/core/tests/custom-ai-model.test.js --ci --coverage
        working-directory: .
      
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core
          path: coverage/

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: test-core
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Start backend in background
        run: |
          cd packages/backend
          cp .env.example .env
          echo "JWT_SECRET=test-secret-$(date +%s)" >> .env
          echo "ADMIN_DEFAULT_PASSWORD=test123" >> .env
          # Use a writable DB path
          mkdir -p $HOME/.smartlangguard
          (setsid node src/server.js > /tmp/backend.log 2>&1 &) 
          sleep 5
          curl -s http://localhost:4000/health || (cat /tmp/backend.log && exit 1)
      
      - name: Run backend smoke test
        run: |
          node -e "
          const fetch = require('node:https');
          const http = require('node:http');
          
          async function main() {
            // Health
            const h = await (await fetch('http://localhost:4000/health')).json();
            if (h.status !== 'ok') throw new Error('health failed');
            console.log('✓ health OK');
            
            // License activate
            const a = await (await fetch('http://localhost:4000/v1/license/activate', {
              method: 'POST',
              headers: {'Content-Type':'application/json'},
              body: JSON.stringify({email:'ci@test.com', tier:'pro'})
            })).json();
            if (!a.token?.startsWith('slg_')) throw new Error('activate failed');
            console.log('✓ license activate OK');
            
            // Validate
            const v = await (await fetch('http://localhost:4000/v1/license/validate', {
              method: 'POST',
              headers: {'Content-Type':'application/json','X-Device-Id':'ci-dev','X-Device-Fingerprint':'ci-fp'},
              body: JSON.stringify({token: a.token})
            })).json();
            if (!v.valid) throw new Error('validate failed');
            console.log('✓ license validate OK');
            
            // AI score with custom model
            const ai = await (await fetch('http://localhost:4000/v1/ai/score', {
              method: 'POST',
              headers: {'Content-Type':'application/json','Authorization':'Bearer ' + a.token},
              body: JSON.stringify({original:'high', candidates:['اهلا','هجلا']})
            })).json();
            if (ai.source !== 'custom-model') throw new Error('AI should use custom model, got: ' + ai.source);
            console.log('✓ AI endpoint uses custom model (no OpenAI cost)');
            
            console.log('\\n✅ All backend CI tests passed');
          }
          main().catch(e => { console.error('❌', e.message); process.exit(1); });
          "
      
      - name: Upload backend logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: /tmp/backend.log

  test-dashboard:
    name: Test Admin Dashboard Build
    runs-on: ubuntu-latest
    needs: test-core
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build admin dashboard
        run: npm run build
        working-directory: packages/admin-dashboard
      
      - name: Verify build artifacts
        run: |
          test -f packages/admin-dashboard/dist/index.html
          test -n "$(ls packages/admin-dashboard/dist/assets/*.js)"
          test -n "$(ls packages/admin-dashboard/dist/assets/*.css)"
          echo "✓ Dashboard built successfully"
      
      - name: Upload dashboard build
        uses: actions/upload-artifact@v4
        with:
          name: admin-dashboard-dist
          path: packages/admin-dashboard/dist/

  lint-browser-extension:
    name: Lint Browser Extension
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Validate manifest.json
        run: |
          node -e "
          const fs = require('fs');
          const m = JSON.parse(fs.readFileSync('packages/browser-extension/manifest.json'));
          if (m.manifest_version !== 3) throw new Error('Must be MV3');
          if (!m.name) throw new Error('Missing name');
          if (!m.version) throw new Error('Missing version');
          console.log('✓ manifest.json is valid');
          "
      
      - name: Check all referenced files exist
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const m = JSON.parse(fs.readFileSync('packages/browser-extension/manifest.json'));
          const files = [
            m.action?.default_popup,
            m.background?.service_worker,
            m.options_page,
            ...m.content_scripts.flatMap(cs => cs.js)
          ];
          for (const f of files) {
            const p = path.join('packages/browser-extension', f);
            if (!fs.existsSync(p)) throw new Error('Missing: ' + f);
            console.log('✓ ' + f);
          }
          "

  smoke-summary:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [test-core, test-backend, test-dashboard, lint-browser-extension]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "Core: ${{ needs.test-core.result }}"
          echo "Backend: ${{ needs.test-backend.result }}"
          echo "Dashboard: ${{ needs.test-dashboard.result }}"
          echo "Extension: ${{ needs.lint-browser-extension.result }}"
          
          if [[ "${{ needs.test-core.result }}" != "success" ]] || \
             [[ "${{ needs.test-backend.result }}" != "success" ]] || \
             [[ "${{ needs.test-dashboard.result }}" != "success" ]] || \
             [[ "${{ needs.lint-browser-extension.result }}" != "success" ]]; then
            echo "❌ Some jobs failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
