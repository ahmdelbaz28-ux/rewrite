name: Build Binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_only:
        description: 'Skip slow platforms (macOS arm64, Linux arm64)'
        required: false
        type: boolean
        default: false

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  CLI_VERSION: '0.1.0'

jobs:
  # ─── Build CLI Binaries ─────────────────────────────────────────────────────
  build-binary:
    name: 🔨 Build CLI - ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: 'win-x64',     os: windows-latest,  cmd: 'npm run build:windows', artifact: 'smartlangguard-win-x64.exe' }
          - { name: 'macos-x64',   os: macos-13,        cmd: 'npm run build:macos',   artifact: 'smartlangguard-macos-x64' }
          - { name: 'macos-arm64', os: macos-latest,    cmd: 'bash scripts/build-macos-arm64.sh', artifact: 'smartlangguard-macos-arm64' }
          - { name: 'linux-x64',   os: ubuntu-latest,   cmd: 'npm run build:linux',   artifact: 'smartlangguard-linux-x64' }
          - { name: 'linux-arm64', os: ubuntu-latest,   cmd: 'bash scripts/build-linux-arm64.sh', artifact: 'smartlangguard-linux-arm64' }
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify @yao-pkg/pkg is installed
        run: |
          echo "=== Checking @yao-pkg/pkg ==="
          npx --yes @yao-pkg/pkg@5.16.1 --version || echo "Will install on demand"
          echo ""
          echo "=== Checking for deprecated pkg ==="
          if [ -d "node_modules/pkg" ]; then
            echo "⚠ Found deprecated 'pkg' in node_modules - removing"
            rm -rf node_modules/pkg
          fi
          echo "✓ Ready to build"
        shell: bash
      
      - name: Build binary
        run: ${{ matrix.target.cmd }}
        working-directory: packages/cli
        shell: bash
      
      - name: Verify binary exists
        run: |
          set -e
          echo "Built files:"
          ls -lh packages/cli/dist/ || true
          
          if [ -z "$(ls packages/cli/dist/smartlangguard-* 2>/dev/null)" ]; then
            echo "❌ No binary built"
            exit 1
          fi
          echo "✅ Binary built successfully"
        shell: bash
      
      - name: Smoke test binary (Unix - same arch only)
        # Only run smoke test when the binary arch matches the runner arch
        # arm64 binaries can't run on x64 runners and vice versa
        if: |
          matrix.target.name != 'win-x64' &&
          !endsWith(matrix.target.name, '-arm64')
        run: |
          set -e
          chmod +x packages/cli/dist/smartlangguard-*
          BINARY=$(ls packages/cli/dist/smartlangguard-* | head -1)
          
          echo "── Binary info ───────────"
          file "$BINARY"
          echo ""
          
          echo "── Version check ───────────"
          VERSION=$("$BINARY" --version)
          echo "Version: $VERSION"
          if [ "$VERSION" != "${{ env.CLI_VERSION }}" ]; then
            echo "❌ Version mismatch: expected ${{ env.CLI_VERSION }}, got $VERSION"
            exit 1
          fi
          echo "✓ Version correct"
          
          echo ""
          echo "── Fix command test ───────────"
          RESULT=$(echo "high" | "$BINARY" fix --no-ai)
          echo "Input: high"
          echo "Output: $RESULT"
          if [ "$RESULT" != "اهلا" ]; then
            echo "❌ Fix failed: expected 'اهلا', got '$RESULT'"
            exit 1
          fi
          echo "✓ Fix command works"
          
          echo ""
          echo "── Detect command test ───────────"
          DETECT=$("$BINARY" detect "high hofhv;" --format json)
          echo "$DETECT" | node -e "
            const d = JSON.parse(require('fs').readFileSync(0));
            if (d.mistakes_found < 1) { console.error('❌ Detect failed'); process.exit(1); }
            console.log('✓ Detect found', d.mistakes_found, 'mistake(s)');
          "
        shell: bash
      
      - name: Verify binary format (arm64 - no execution)
        # For arm64 binaries built on x64 runners, just verify the file format
        if: |
          matrix.target.name != 'win-x64' &&
          endsWith(matrix.target.name, '-arm64')
        run: |
          set -e
          chmod +x packages/cli/dist/smartlangguard-*
          BINARY=$(ls packages/cli/dist/smartlangguard-* | head -1)
          
          echo "── Binary info ───────────"
          file "$BINARY"
          echo ""
          
          # Verify it's an ARM binary (cannot execute on x64 runner)
          if file "$BINARY" | grep -q "ARM aarch64\|ARM64"; then
            echo "✓ ARM64 binary format verified"
          elif file "$BINARY" | grep -q "arm64"; then
            echo "✓ arm64 binary format verified"
          else
            echo "⚠ Unexpected binary format (may still be valid)"
            file "$BINARY"
          fi
          
          # Verify file size is reasonable (>10MB for a Node.js binary)
          SIZE=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY")
          if [ "$SIZE" -lt 10000000 ]; then
            echo "❌ Binary too small: $SIZE bytes"
            exit 1
          fi
          echo "✓ Binary size: $((SIZE / 1024 / 1024)) MB"
        shell: bash
      
      - name: Smoke test binary (Windows)
        if: matrix.target.name == 'win-x64'
        run: |
          $ErrorActionPreference = "Stop"
          $binary = Get-ChildItem packages/cli/dist/smartlangguard-*.exe | Select-Object -First 1
          
          Write-Host "── Version check ───────────"
          $version = & $binary --version
          Write-Host "Version: $version"
          if ($version -ne "${{ env.CLI_VERSION }}") {
            Write-Error "Version mismatch: expected ${{ env.CLI_VERSION }}, got $version"
            exit 1
          }
          Write-Host "✓ Version correct"
          
          Write-Host ""
          Write-Host "── Fix command test ───────────"
          $result = "high" | & $binary fix --no-ai
          Write-Host "Input: high"
          Write-Host "Output: $result"
          if ($result -ne "اهلا") {
            Write-Error "Fix failed: expected 'اهلا', got '$result'"
            exit 1
          }
          Write-Host "✓ Fix command works"
        shell: pwsh
      
      - name: Generate SHA256 checksum
        run: |
          set -e
          cd packages/cli/dist
          
          # Use shasum (more portable) or sha256sum
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 smartlangguard-* > checksums.sha256
          else
            sha256sum smartlangguard-* > checksums.sha256
          fi
          
          echo "── Checksums ───────────"
          cat checksums.sha256
        shell: bash
      
      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: binary-${{ matrix.target.name }}
          path: |
            packages/cli/dist/smartlangguard-*
            packages/cli/dist/checksums.sha256
          retention-days: 30
          if-no-files-found: error

  # ─── Build Admin Dashboard ──────────────────────────────────────────────────
  build-dashboard:
    name: 📊 Build Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build dashboard
        run: npm run build
        working-directory: packages/admin-dashboard
      
      - name: Remove sourcemaps from production build
        run: |
          # Sourcemaps expose original source code and aren't needed in production
          rm -f packages/admin-dashboard/dist/assets/*.js.map
          rm -f packages/admin-dashboard/dist/assets/*.css.map
          echo "✓ Removed sourcemaps"
          ls -lh packages/admin-dashboard/dist/assets/
      
      - name: Create dashboard zip
        run: |
          # Create dashboard.zip at repo root
          # Path: packages/admin-dashboard/dist → repo root = 3 levels up
          cd packages/admin-dashboard/dist
          zip -r "../../../dashboard.zip" .
          cd ../../..
          ls -lh dashboard.zip
        shell: bash
      
      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v5
        with:
          name: admin-dashboard
          # Only upload the zip (not the raw dist folder)
          path: dashboard.zip
          retention-days: 30
          if-no-files-found: error

  # ─── Build VS Code Extension ───────────────────────────────────────────────
  build-vscode-extension:
    name: 🧩 Build VS Code Extension
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm ci
      
      - name: Install extension dev dependencies
        run: npm install
        working-directory: packages/vscode-extension
      
      - name: Compile TypeScript
        run: npm run compile
        working-directory: packages/vscode-extension
      
      - name: Build .vsix package
        run: |
          set -e
          mkdir -p packages/vscode-extension/dist
          
          # Create a temp directory with only the files we want to package
          # This avoids vsce trying to include parent dir files (../package.json)
          TMPDIR=$(mktemp -d)
          trap "rm -rf $TMPDIR" EXIT
          
          # Copy only required files (no sourcemaps, no .d.ts, no icon-512)
          cp packages/vscode-extension/{package.json,README.md,CHANGELOG.md,LICENSE,.vscodeignore} "$TMPDIR/"
          mkdir -p "$TMPDIR/assets" "$TMPDIR/out"
          
          # Only copy production icons (128x128 and 256x256 for Marketplace)
          cp packages/vscode-extension/assets/icon.png "$TMPDIR/assets/" 2>/dev/null || true
          cp packages/vscode-extension/assets/icon-128.png "$TMPDIR/assets/" 2>/dev/null || true
          # Skip icon-512.png (not needed, 57KB wasted)
          
          # Copy only compiled JS (no .map, no .d.ts)
          cp packages/vscode-extension/out/extension.js "$TMPDIR/out/"
          
          echo "── Files in clean build dir ───────────"
          find "$TMPDIR" -type f | sed "s|$TMPDIR/||"
          
          # Package in clean dir
          (cd "$TMPDIR" && npx --yes @vscode/vsce@latest package --no-update-package-json --no-git-tag-version --allow-package-all-secrets)
          
          # Move .vsix to dist
          mv "$TMPDIR"/*.vsix packages/vscode-extension/dist/
          
          # Verify
          echo ""
          echo "── Built .vsix ───────────"
          ls -lh packages/vscode-extension/dist/*.vsix
          
          # Verify contents
          echo ""
          echo "── VSIX contents ───────────"
          unzip -l packages/vscode-extension/dist/*.vsix
        shell: bash
      
      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v5
        with:
          name: vscode-extension
          path: packages/vscode-extension/dist/*.vsix
          retention-days: 30
          if-no-files-found: error

  # ─── Build Browser Extension ───────────────────────────────────────────────
  build-browser-extension:
    name: 🌐 Build Browser Extension
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Validate manifest
        run: |
          node -e "
          const m = require('./packages/browser-extension/manifest.json');
          if (m.manifest_version !== 3) throw new Error('Must be MV3');
          console.log('✓ Manifest is valid MV3, version:', m.version);
          "
      
      - name: Verify all referenced files exist
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const m = require('./packages/browser-extension/manifest.json');
          const files = [
            m.action?.default_popup,
            m.background?.service_worker,
            m.options_page,
            ...(m.content_scripts?.flatMap(cs => cs.js) || [])
          ].filter(Boolean);
          for (const f of files) {
            const p = path.join('packages/browser-extension', f);
            if (!fs.existsSync(p)) throw new Error('Missing: ' + f);
            console.log('✓ ' + f);
          }
          "
      
      - name: Create extension zip (for Chrome Web Store upload)
        run: |
          set -e
          mkdir -p dist
          
          VERSION=$(node -p "require('./packages/browser-extension/manifest.json').version")
          echo "Extension version: $VERSION"
          
          cd packages/browser-extension
          zip -r "../../dist/smartlangguard-extension-v${VERSION}.zip" . \
            -x "node_modules/*" -x "tests/*" -x ".git/*" -x "*.log" -x "README.md" \
            -x "package.json" -x "package-lock.json"
          cd ../..
          
          ls -lh dist/
          echo ""
          echo "── Zip contents ───────────"
          unzip -l dist/smartlangguard-extension-v${VERSION}.zip | head -20
      
      - name: Upload extension zip artifact
        uses: actions/upload-artifact@v5
        with:
          name: browser-extension
          path: dist/smartlangguard-extension-*.zip
          retention-days: 30
          if-no-files-found: error

  # ─── Summary Job ────────────────────────────────────────────────────────────
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-binary, build-dashboard, build-vscode-extension, build-browser-extension]
    if: always()
    timeout-minutes: 2
    
    steps:
      - name: Generate summary
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CLI Binaries (5 platforms) | ${{ needs.build-binary.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin Dashboard | ${{ needs.build-dashboard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VS Code Extension (.vsix) | ${{ needs.build-vscode-extension.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser Extension (.zip) | ${{ needs.build-browser-extension.result }} |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.build-binary.result }}" != "success" ]] || \
             [[ "${{ needs.build-dashboard.result }}" != "success" ]] || \
             [[ "${{ needs.build-vscode-extension.result }}" != "success" ]] || \
             [[ "${{ needs.build-browser-extension.result }}" != "success" ]]; then
            echo ""
            echo "❌ Some build jobs failed"
            exit 1
          fi
          
          echo ""
          echo "✅ All builds passed!"
