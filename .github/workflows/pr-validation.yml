name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, develop]

# Cancel in-progress runs when a new commit is pushed
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  # ─── Validate PR title (conventional commits) ───────────────────────────────
  validate-pr-title:
    name: 📝 Validate PR Title
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: Check PR title format
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $PR_TITLE"
          
          # Conventional commit format: type(scope): description
          # Examples: feat: ..., fix: ..., docs: ..., chore: ..., refactor: ...
          PATTERN='^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\([a-z-]+\))?: .+'
          
          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            echo "❌ PR title doesn't follow conventional commits format"
            echo ""
            echo "Expected format: type(scope): description"
            echo ""
            echo "Valid types:"
            echo "  feat     - new feature"
            echo "  fix      - bug fix"
            echo "  docs     - documentation only"
            echo "  style    - code style (formatting, etc)"
            echo "  refactor - code change that neither fixes a bug nor adds a feature"
            echo "  test     - adding tests"
            echo "  chore    - build process, dependencies, etc"
            echo "  perf     - performance improvement"
            echo "  ci       - CI/CD changes"
            echo "  build    - build system changes"
            echo "  revert   - revert a previous commit"
            echo ""
            echo "Examples:"
            echo "  feat: add real-time typing detection"
            echo "  fix(core): correct Arabic letter mapping"
            echo "  docs(api): update license endpoint examples"
            exit 1
          fi
          
          echo "✓ PR title follows conventional commits format"

  # ─── Quick tests (fast feedback for PRs) ────────────────────────────────────
  quick-tests:
    name: ⚡ Quick Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run core tests (fast)
        run: npx jest packages/core/tests/ --ci --reporters=default
        env:
          CI: true
      
      - name: Validate package.json files
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          const packages = [
            '.',
            'packages/core',
            'packages/cli',
            'packages/mcp-server',
            'packages/daemon',
            'packages/vscode-extension',
            'packages/backend',
            'packages/admin-dashboard',
            'packages/browser-extension'
          ];
          
          let failed = 0;
          for (const pkg of packages) {
            const pkgPath = path.join(pkg, 'package.json');
            if (!fs.existsSync(pkgPath)) {
              console.log('⚠ ' + pkg + ' - no package.json (skipped)');
              continue;
            }
            try {
              const data = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
              if (!data.name) throw new Error('Missing name');
              if (!data.version) throw new Error('Missing version');
              console.log('✓ ' + (data.name || pkg) + ' v' + data.version);
            } catch (e) {
              console.error('✗ ' + pkg + ': ' + e.message);
              failed++;
            }
          }
          if (failed > 0) process.exit(1);
          "

  # ─── Code quality checks ────────────────────────────────────────────────────
  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Check for secrets
        run: |
          echo "── Checking for common secret patterns ───────────"
          
          # Check for common secret patterns
          SECRETS_FOUND=0
          
          # GitHub tokens
          if grep -r "ghp_[a-zA-Z0-9]\{36\}" --include="*.js" --include="*.ts" --include="*.json" --include="*.yml" --include="*.md" . 2>/dev/null | grep -v node_modules | grep -v ".git/"; then
            echo "❌ GitHub token found!"
            SECRETS_FOUND=1
          fi
          
          # GitHub fine-grained PATs
          if grep -r "github_pat_[a-zA-Z0-9_]\{20,\}" --include="*.js" --include="*.ts" --include="*.json" --include="*.yml" --include="*.md" . 2>/dev/null | grep -v node_modules | grep -v ".git/"; then
            echo "❌ GitHub PAT found!"
            SECRETS_FOUND=1
          fi
          
          # AWS keys
          if grep -r "AKIA[0-9A-Z]\{16\}" --include="*.js" --include="*.ts" --include="*.json" --include="*.yml" . 2>/dev/null | grep -v node_modules | grep -v ".git/"; then
            echo "❌ AWS access key found!"
            SECRETS_FOUND=1
          fi
          
          # Generic API keys (sk_, pk_, slg_)
          if grep -rE "(sk|pk)_(live|test)_[a-zA-Z0-9]{20,}" --include="*.js" --include="*.ts" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v ".git/" | grep -v ".env.example"; then
            echo "⚠ Stripe-like API key pattern found (may be a false positive in .env.example)"
            # Don't fail for this - just warn
          fi
          
          if [ $SECRETS_FOUND -gt 0 ]; then
            exit 1
          fi
          
          echo "✓ No secrets found"
      
      - name: Check for TODOs/FIXMEs in production code
        run: |
          echo "── Checking for TODO/FIXME in production code ───────────"
          
          # Find TODOs in production code (not tests)
          TODOS=$(grep -rE "(TODO|FIXME|HACK|XXX)" --include="*.js" --include="*.ts" packages/*/src/ 2>/dev/null | grep -v node_modules | grep -v ".d.ts" || true)
          
          if [ -n "$TODOS" ]; then
            echo "⚠ Found TODOs/FIXMEs in production code:"
            echo "$TODOS"
            echo ""
            echo "(Not failing the build, but please address these)"
          else
            echo "✓ No TODOs/FIXMEs found"
          fi
      
      - name: Check line endings (LF only)
        run: |
          echo "── Checking for CRLF line endings ───────────"
          
          # Find files with CRLF
          CRLF_FILES=$(find packages -type f \( -name "*.js" -o -name "*.ts" -o -name "*.json" -o -name "*.md" -o -name "*.yml" \) \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" \
            -exec grep -l $'\r$' {} \; 2>/dev/null || true)
          
          if [ -n "$CRLF_FILES" ]; then
            echo "❌ Found files with CRLF line endings:"
            echo "$CRLF_FILES"
            exit 1
          fi
          
          echo "✓ All files use LF line endings"

  # ─── PR Summary ─────────────────────────────────────────────────────────────
  pr-summary:
    name: 📋 PR Summary
    runs-on: ubuntu-latest
    needs: [validate-pr-title, quick-tests, code-quality]
    if: always()
    timeout-minutes: 2
    
    steps:
      - name: Generate PR summary
        run: |
          echo "## 📋 PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PR Title Format | ${{ needs.validate-pr-title.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quick Tests | ${{ needs.quick-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.validate-pr-title.result }}" != "success" ]] || \
             [[ "${{ needs.quick-tests.result }}" != "success" ]] || \
             [[ "${{ needs.code-quality.result }}" != "success" ]]; then
            echo ""
            echo "❌ PR validation failed"
            exit 1
          fi
          
          echo ""
          echo "✅ All PR checks passed!"
