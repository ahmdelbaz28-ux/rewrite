<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6feb" />
      <stop offset="50%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#1f6feb" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fb950" />
      <stop offset="100%" stop-color="#1f6feb" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0" />
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.15" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" />
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#30363d" stroke-width="1.5" />
  <circle cx="100" cy="100" r="86" fill="none" stroke="#21262d" stroke-width="1" />

  <!-- Shield shape -->
  <path d="M100 28 C125 28 145 40 155 55 L155 90 C155 130 130 155 100 170 C70 155 45 130 45 90 L45 55 C55 40 75 28 100 28Z" 
        fill="url(#shield)" opacity="0.15" stroke="url(#shield)" stroke-width="2" />
  
  <!-- Shield shine overlay -->
  <path d="M100 28 C125 28 145 40 155 55 L155 90 C155 130 130 155 100 170 C70 155 45 130 45 90 L45 55 C55 40 75 28 100 28Z" 
        fill="url(#shine)" />

  <!-- Checkmark (correction symbol) -->
  <path d="M72 100 L92 122 L130 78" 
        fill="none" stroke="#3fb950" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Arrow indicating transformation -->
  <path d="M78 138 L100 150 L122 138" 
        fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />

  <!-- Small arrow head -->
  <path d="M118 140 L122 138 L120 143" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />

  <!-- Bottom divider -->
  <line x1="55" y1="180" x2="145" y2="180" stroke="#30363d" stroke-width="0.8" />

  <!-- Brand name -->
  <text x="100" y="192" text-anchor="middle" fill="#8b949e" font-family="'Segoe UI', -apple-system, sans-serif" font-size="7.5" font-weight="500" letter-spacing="1.5">SMARTLANG GUARD</text>
</svg>
