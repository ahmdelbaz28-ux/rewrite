<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f857a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5858;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" />
  
  <!-- Outer ring gradient -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.3" />
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.2" />

  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="url(#glow)" stroke-width="0.5" opacity="0.15" stroke-dasharray="4 4" />

  <!-- Abstract S letterform - left curve -->
  <path d="M120 50 C95 50 70 60 70 80 C70 95 80 105 95 110 C110 115 120 120 120 135 C120 150 105 160 90 160" 
        fill="none" stroke="url(#glow)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  
  <!-- Abstract L letterform - vertical -->
  <path d="M132 50 L132 160" 
        fill="none" stroke="url(#ring)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Abstract G letterform - curve -->
  <path d="M80 135 C90 155 115 155 125 140 C130 132 130 120 125 115" 
        fill="none" stroke="url(#glow)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

  <!-- Small accent dots -->
  <circle cx="68" cy="75" r="3" fill="#00d2ff" opacity="0.6" />
  <circle cx="135" cy="45" r="2" fill="#f857a6" opacity="0.6" />
  <circle cx="140" cy="155" r="2.5" fill="#00d2ff" opacity="0.4" />
  <circle cx="65" cy="140" r="2" fill="#f857a6" opacity="0.5" />

  <!-- Bottom divider glow line -->
  <line x1="55" y1="168" x2="145" y2="168" stroke="url(#glow)" stroke-width="1" opacity="0.3" />

  <!-- Tagline -->
  <text x="100" y="184" text-anchor="middle" fill="url(#glow)" font-family="'Segoe UI', -apple-system, Arial, sans-serif" font-size="8.5" font-weight="600" letter-spacing="3" opacity="0.7">SMARTLANG GUARD</text>
</svg>
