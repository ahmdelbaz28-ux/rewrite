<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" rx="45" fill="url(#bg)"/>
  
  <!-- Shield icon -->
  <path d="M100 30 L160 55 L160 100 C160 145 135 170 100 185 C65 170 40 145 40 100 L40 55 Z" 
        fill="none" stroke="url(#accent)" stroke-width="3"/>
  <path d="M100 45 L145 63 L145 100 C145 135 125 155 100 168 C75 155 55 135 55 100 L55 63 Z" 
        fill="url(#accent)" opacity="0.15"/>
  
  <!-- Checkmark inside shield -->
  <path d="M80 100 L93 113 L120 86" fill="none" stroke="#e94560" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- SLG text -->
  <text x="100" y="80" text-anchor="middle" fill="#ffffff" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="800" letter-spacing="4">SLG</text>
  
  <!-- Divider line -->
  <rect x="50" y="158" width="100" height="2" rx="1" fill="#e94560" opacity="0.6"/>
  
  <!-- Tagline -->
  <text x="100" y="180" text-anchor="middle" fill="#8899aa" font-family="'Segoe UI', Arial, sans-serif" font-size="11" letter-spacing="1">SMART LANG GUARD</text>
</svg>